<!doctype html><html><head><meta charset="utf-8"><title>Type — Display & headings</title>

<body>
  <div class="row">

    <div class="tag">h2 · 40/500</div><div class="sample" style="font-size:28px;font-weight:500;letter-spacing:-0.02em;">About the approach</div>
    <div class="tag">h3 · 28/500</div><div class="sample" style="font-size:22px;font-weight:500;letter-spacing:-0.01em;">Broadband access study</div>
    <div class="tag">h6 · 14/600</div><div class="sample" style="font-size:12px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-3);">Case study · 2025</div>
  </div>
