<!doctype html><html><head><meta charset="utf-8"><title>Components — Tags & chart</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--bg-1);font-family:var(--font-sans);display:grid;grid-template-columns:1fr 1.2fr;gap:28px;align-items:center;}
  .h{font-size:11px;color:var(--fg-3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;}
  .tags{display:flex;flex-wrap:wrap;gap:6px;}
  .tag{font-family:var(--font-mono);font-size:11px;padding:3px 10px;border-radius:999px;background:var(--bg-2);color:var(--fg-2);border:1px solid var(--border-1);}
  .tag.accent{background:var(--gradient-accent-soft);border-color:transparent;color:var(--graphite);}
  .tag.solid{background:var(--ink);color:var(--paper);border-color:var(--ink);}
  .chart{display:flex;align-items:flex-end;gap:5px;height:120px;padding:0 4px;}
  .bar{flex:1;border-radius:3px 3px 0 0;}
  .stat{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;}
  .num{font-size:28px;font-weight:400;letter-spacing:-0.02em;color:var(--fg-1);font-family:var(--font-mono);}
  .delta{font-size:12px;color:var(--success);}
</style></head>
<body>
  <div>
    <div class="h">Tags</div>
    <div class="tags">
      <span class="tag">data-viz</span>
      <span class="tag">python</span>
      <span class="tag accent">featured</span>
      <span class="tag">2025</span>
      <span class="tag solid">case study</span>
      <span class="tag">observable</span>
    </div>
  </div>
  <div>
    <div class="h">Data-viz (series use mono scale + gradient stops)</div>
    <div class="stat"><span class="num">12,438</span><span class="delta">+3.2%</span></div>
    <div class="chart">
      <div class="bar" style="height:30%;background:#E6E4DD"></div>
      <div class="bar" style="height:42%;background:#E6E4DD"></div>
      <div class="bar" style="height:55%;background:#BDBAB1"></div>
      <div class="bar" style="height:48%;background:#BDBAB1"></div>
      <div class="bar" style="height:70%;background:#6E6B63"></div>
      <div class="bar" style="height:62%;background:#6E6B63"></div>
      <div class="bar" style="height:88%;background:var(--accent-a)"></div>
      <div class="bar" style="height:76%;background:var(--accent-b)"></div>
      <div class="bar" style="height:94%;background:var(--accent-c)"></div>
    </div>
  </div>
</body></html>
