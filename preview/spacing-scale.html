<!doctype html><html><head><meta charset="utf-8"><title>Spacing — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--bg-1);font-family:var(--font-sans);}
  .h{font-size:11px;color:var(--fg-3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;}
  .row{display:grid;grid-template-columns:80px 1fr 60px;align-items:center;gap:12px;padding:4px 0;border-bottom:1px solid var(--border-1);}
  .row:last-child{border:0;}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);}
  .px{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);text-align:right;}
  .bar{height:14px;background:var(--gradient-accent-soft);border-radius:3px;}
</style></head>
<body>
<div class="h">Spacing scale · 4px base</div>
<div class="row"><span class="tok">--sp-1</span><div class="bar" style="width:4px"></div><span class="px">4</span></div>
<div class="row"><span class="tok">--sp-2</span><div class="bar" style="width:8px"></div><span class="px">8</span></div>
<div class="row"><span class="tok">--sp-3</span><div class="bar" style="width:12px"></div><span class="px">12</span></div>
<div class="row"><span class="tok">--sp-4</span><div class="bar" style="width:16px"></div><span class="px">16</span></div>
<div class="row"><span class="tok">--sp-5</span><div class="bar" style="width:24px"></div><span class="px">24</span></div>
<div class="row"><span class="tok">--sp-6</span><div class="bar" style="width:32px"></div><span class="px">32</span></div>
<div class="row"><span class="tok">--sp-7</span><div class="bar" style="width:48px"></div><span class="px">48</span></div>
<div class="row"><span class="tok">--sp-8</span><div class="bar" style="width:64px"></div><span class="px">64</span></div>
<div class="row"><span class="tok">--sp-9</span><div class="bar" style="width:96px"></div><span class="px">96</span></div>
</body></html>
