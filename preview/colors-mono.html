<!doctype html><html><head><meta charset="utf-8"><title>Colors — Monochrome scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--bg-1);font-family:var(--font-sans);}
  .row{display:grid;grid-template-columns:repeat(7,1fr);gap:10px;}
  .sw{border-radius:var(--r-md);overflow:hidden;border:1px solid var(--border-1);}
  .chip{height:76px;}
  .meta{padding:8px 10px;background:var(--bg-1);}
  .name{font-size:12px;font-weight:500;color:var(--fg-1);letter-spacing:-0.01em;}
  .hex{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);margin-top:2px;}
  .h{font-size:11px;color:var(--fg-3);letter-spacing:0.08em;text-transform:uppercase;margin-bottom:10px;}
</style></head>
<body>
  <div class="h">Monochrome scale · paper → ink</div>
  <div class="row">
    <div class="sw"><div class="chip" style="background:#FAFAF7;border-bottom:1px solid var(--border-1)"></div><div class="meta"><div class="name">paper</div><div class="hex">#FAFAF7</div></div></div>
    <div class="sw"><div class="chip" style="background:#F2F1EC"></div><div class="meta"><div class="name">bone</div><div class="hex">#F2F1EC</div></div></div>
    <div class="sw"><div class="chip" style="background:#E6E4DD"></div><div class="meta"><div class="name">mist</div><div class="hex">#E6E4DD</div></div></div>
    <div class="sw"><div class="chip" style="background:#BDBAB1"></div><div class="meta"><div class="name">ash</div><div class="hex">#BDBAB1</div></div></div>
    <div class="sw"><div class="chip" style="background:#6E6B63"></div><div class="meta"><div class="name">slate</div><div class="hex">#6E6B63</div></div></div>
    <div class="sw"><div class="chip" style="background:#3A3832"></div><div class="meta"><div class="name">graphite</div><div class="hex">#3A3832</div></div></div>
    <div class="sw"><div class="chip" style="background:#14130F"></div><div class="meta"><div class="name">ink</div><div class="hex">#14130F</div></div></div>
  </div>
</body></html>
