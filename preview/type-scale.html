<!doctype html><html><head><meta charset="utf-8"><title>Type — Scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:20px 28px;background:var(--bg-1);font-family:var(--font-sans);}
  table{width:100%;border-collapse:collapse;}
  th,td{text-align:left;padding:6px 10px;border-bottom:1px solid var(--border-1);}
  th{font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--fg-3);font-weight:500;}
  .tok{font-family:var(--font-mono);font-size:11px;color:var(--fg-2);}
  .size{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
  .preview{color:var(--fg-1);line-height:1;}
</style></head>
<body>
<table>
  <tr><th>Token</th><th>Size</th><th>Specimen</th></tr>
  <tr><td class="tok">--size-xs</td><td class="size">12</td><td class="preview" style="font-size:12px">The quiet observer</td></tr>
  <tr><td class="tok">--size-sm</td><td class="size">14</td><td class="preview" style="font-size:14px">The quiet observer</td></tr>
  <tr><td class="tok">--size-base</td><td class="size">16</td><td class="preview" style="font-size:16px">The quiet observer</td></tr>
  <tr><td class="tok">--size-md</td><td class="size">18</td><td class="preview" style="font-size:18px">The quiet observer</td></tr>
  <tr><td class="tok">--size-lg</td><td class="size">22</td><td class="preview" style="font-size:22px">The quiet observer</td></tr>
  <tr><td class="tok">--size-xl</td><td class="size">28</td><td class="preview" style="font-size:28px">The quiet observer</td></tr>
  <tr><td class="tok">--size-2xl</td><td class="size">40</td><td class="preview" style="font-size:40px">The quiet observer</td></tr>
  <tr><td class="tok">--size-3xl</td><td class="size">56</td><td class="preview" style="font-size:56px;font-weight:300;letter-spacing:-0.03em">The quiet observer</td></tr>
</table>
</body></html>
