<!doctype html><html><head><meta charset="utf-8"><title>Components — Buttons</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;padding:24px 28px;background:var(--bg-1);font-family:var(--font-sans);display:flex;flex-direction:column;gap:18px;}
  .row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
  .lbl{font-family:var(--font-mono);font-size:10px;color:var(--fg-3);letter-spacing:0.04em;width:80px;flex-shrink:0;}
  .btn{font-family:inherit;font-size:14px;font-weight:500;padding:10px 18px;border-radius:999px;border:0;cursor:pointer;transition:all var(--dur-med) var(--ease-out);letter-spacing:-0.01em;}
  .btn-primary{background:var(--gradient-accent);color:#fff;box-shadow:var(--shadow-1);}
  .btn-primary:hover{box-shadow:var(--shadow-glow);transform:translateY(-1px);}
  .btn-secondary{background:transparent;color:var(--fg-1);border:1px solid var(--border-2);}
  .btn-secondary:hover{background:var(--bg-2);}
  .btn-ghost{background:transparent;color:var(--fg-2);padding:10px 14px;}
  .btn-ghost:hover{color:var(--fg-1);}
  .arrow{color:var(--fg-1);text-decoration:none;font-size:14px;border-bottom:1px solid var(--border-2);padding-bottom:2px;}
  .arrow:hover{color:var(--ink);border-color:var(--graphite);}
  .disabled{opacity:0.4;pointer-events:none;}
</style></head>
<body>
  <div class="row"><span class="lbl">primary</span>
    <button class="btn btn-primary">Get in touch</button>
    <button class="btn btn-primary">Read the study →</button>
    <button class="btn btn-primary disabled">Disabled</button>
  </div>
  <div class="row"><span class="lbl">secondary</span>
    <button class="btn btn-secondary">See the code</button>
    <button class="btn btn-secondary">Download CV</button>
  </div>
  <div class="row"><span class="lbl">ghost</span>
    <button class="btn btn-ghost">Cancel</button>
    <button class="btn btn-ghost">More →</button>
  </div>
  <div class="row"><span class="lbl">text link</span>
    <a class="arrow" href="#">read more →</a>
    <a class="arrow" href="#">back to work</a>
  </div>
</body></html>
