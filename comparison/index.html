<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>LLM Comparison — Comparison Project</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../colors_and_type.css">
  <style>
    body { margin: 0; }
    em { font-style: italic; color: var(--fg-1); }
    @keyframes barGrow {
      from { transform: scaleX(0); }
      to   { transform: scaleX(var(--bar-scale, 1)); }
    }
    .bar-fill {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      transform-origin: left center;
      transform: scaleX(var(--bar-scale, 1));
      animation: barGrow 800ms cubic-bezier(0.22, 0.61, 0.36, 1) var(--bar-delay, 0ms) both;
    }
    @keyframes winnerFade {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    .bar-winner {
      animation: winnerFade 400ms cubic-bezier(0.22, 0.61, 0.36, 1) var(--winner-delay, 0ms) both;
    }
    @keyframes resultsReveal {
      from { opacity: 0; transform: translateY(18px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .results-reveal {
      animation: resultsReveal 500ms cubic-bezier(0.22, 0.61, 0.36, 1) both;
    }

    /* ── Responsive ────────────────────────────────── */
    @media (max-width: 768px) {
      .nav          { padding: 16px 20px !important; }
      .nav-byline   { display: none !important; }
      .section      { padding-left: 20px !important; padding-right: 20px !important; }
      .section-hero { padding-top: 44px !important; padding-bottom: 28px !important; }
      .hero-title   { font-size: 36px !important; line-height: 1.1 !important; }
      .info-row     { flex-wrap: wrap !important; gap: 6px !important; }
      .info-source  { margin-left: 0 !important; }
      .selector-grid      { grid-template-columns: 1fr !important; }
      .selector-grid > *  { width: 100% !important; }
      .legend       { flex-wrap: wrap !important; gap: 12px !important; }
      .legend-score { flex-basis: 100% !important; justify-content: flex-start !important; }
      .charts-grid  { grid-template-columns: 1fr !important; gap: 40px !important; }
      .radar-col    { position: static !important; }
      .bar-raw      { display: none !important; }
      .footer       { flex-direction: column !important; gap: 8px !important; }
    }
  </style>
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="app.jsx"></script>
  <script type="text/babel">
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App/>);
  </script>
</body>
</html>
